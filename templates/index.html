<!DOCTYPE html>
<html>
<head>
<title>Real Estate AI Predictor</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

/* HEADER */

.header{
background:#1f3c88;
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

/* CONTAINER */

.container{
width:900px;
margin:auto;
margin-top:40px;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:30px;
}

/* BUTTONS */

.selector{
text-align:center;
margin-bottom:20px;
}

.selector button{
background:#1f3c88;
color:white;
border:none;
padding:12px 25px;
margin:10px;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.selector button:hover{
background:#16306b;
}

/* FORM */

form{
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:20px;
}

form label{
font-weight:bold;
font-size:14px;
}

form input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
box-sizing:border-box;
}

.full{
grid-column:1 / span 2;
}

/* SUBMIT */

.submit{
background:#28a745;
color:white;
padding:14px;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.submit:hover{
background:#1f7d35;
}

/* RESULT */

.result{
text-align:center;
font-size:28px;
font-weight:bold;
color:#1f3c88;
}

</style>

<script>
function showForm(type){

document.getElementById("maison_form").style.display = "none";
document.getElementById("appart_form").style.display = "none";

if(type === "maison"){
document.getElementById("maison_form").style.display = "block";
}

if(type === "appartement"){
document.getElementById("appart_form").style.display = "block";
}

}
</script>

</head>


<body>

<div class="header">
Real Estate AI Price Predictor
</div>


<div class="container">

<div class="selector">
<button onclick="showForm('maison')">Maison</button>
<button onclick="showForm('appartement')">Appartement</button>
</div>


<!-- MAISON -->

<div id="maison_form" class="card" style="display:none">

<h2>Maison Prediction</h2>

<form method="POST">

<input type="hidden" name="form_type" value="maison">

<div>
<label>Longitude</label>
<input type="text" name="longitude">
</div>

<div>
<label>Latitude</label>
<input type="text" name="latitude">
</div>

<div>
<label>Code Postal</label>
<input type="text" name="code_postal">
</div>

<div>
<label>Surface Bâti (m²)</label>
<input type="text" name="surface_reelle_bati">
</div>

<div>
<label>Nombre Pièces</label>
<input type="text" name="nombre_pieces_principales">
</div>

<div>
<label>Prix m² Référence</label>
<input type="text" name="prix_m2_ref">
</div>

<div>
<label>Surface Terrain</label>
<input type="text" name="surface_terrain">
</div>

<div>
<label>Number of Lots</label>
<input type="text" name="number_of_lots">
</div>

<div class="full">
<button class="submit" type="submit">Predict Price</button>
</div>

</form>

</div>


<!-- APPARTEMENT -->

<div id="appart_form" class="card" style="display:none">

<h2>Appartement Prediction</h2>

<form method="POST">

<input type="hidden" name="form_type" value="appartement">

<div>
<label>Longitude</label>
<input type="text" name="longitude">
</div>

<div>
<label>Latitude</label>
<input type="text" name="latitude">
</div>

<div>
<label>Code Postal</label>
<input type="text" name="code_postal">
</div>

<div>
<label>Surface Bâti (m²)</label>
<input type="text" name="surface_reelle_bati">
</div>

<div>
<label>Nombre Pièces</label>
<input type="text" name="nombre_pieces_principales">
</div>

<div>
<label>Prix m² Référence</label>
<input type="text" name="prix_m2_ref">
</div>

<div>
<label>Total Carrez Surface</label>
<input type="text" name="total_carrez_surface">
</div>

<div>
<label>Number of Lots</label>
<input type="text" name="number_of_lots">
</div>

<div class="full">
<button class="submit" type="submit">Predict Price</button>
</div>

</form>

</div>


{% if prediction %}

<div class="card result">

Estimated Price<br><br>

{{ prediction }} €

</div>

{% endif %}

</div>

</body>
</html>
